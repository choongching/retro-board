<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Page background — matches the app's near-white surface -->
  <rect width="1200" height="630" fill="#f6f7f9"/>

  <!-- Top brand accent strip -->
  <rect width="1200" height="4" fill="#2563eb"/>

  <!-- Wordmark group: text anchored middle, dot placed after the final 'o' -->
  <g transform="translate(600 340)">
    <text
      x="0" y="0"
      text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
      font-size="124"
      font-weight="700"
      letter-spacing="-3.6"
      fill="#0f172a">JomRetro</text>
    <circle cx="270" cy="-10" r="14" fill="#2563eb"/>
  </g>

  <!-- Tagline -->
  <text
    x="600" y="425"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#475569">Retros that don't drag.</text>

  <!-- Subline — feature triplet -->
  <text
    x="600" y="478"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#94a3b8">Multiplayer  ·  Real-time  ·  No signup</text>

  <!-- URL bottom-left -->
  <text
    x="60" y="588"
    font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="20"
    font-weight="500"
    letter-spacing="3"
    fill="#94a3b8">JOMRETRO.COM</text>
</svg>
